<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://viyeyixvxvqwzwnmsfdl.supabase.co https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline';">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <title>TikTok Wallet</title>
  <script src="theme.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', -apple-system, sans-serif;
      max-width: 420px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(254,44,85,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px; right: -100px;
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(37,244,238,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo {
      text-align: center;
      margin-bottom: 44px;
    }
    .logo-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #fe2c55, #ff6b9d);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 18px;
      box-shadow: 0 8px 32px rgba(254,44,85,0.35);
    }
    .logo h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
    .logo p { font-size: 14px; color: #666; margin-top: 6px; font-weight: 400; }

    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      font-size: 12px; font-weight: 600; color: #888;
      display: block; margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.6px;
    }
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%;
      background: #1a1a1a;
      border: 1.5px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 16px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap input:focus {
      border-color: #fe2c55;
      box-shadow: 0 0 0 3px rgba(254,44,85,0.1);
    }
    .input-wrap input::placeholder { color: #3a3a3a; }
    .pw-toggle {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer; font-size: 16px; color: #555;
      user-select: none;
    }

    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, #fe2c55, #ff6b35);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(254,44,85,0.35);
      letter-spacing: 0.3px;
    }
    .login-btn:hover { box-shadow: 0 6px 28px rgba(254,44,85,0.5); }
    .login-btn:active { opacity: 0.9; transform: scale(0.98); }
    .login-btn:disabled { background: #222; color: #444; cursor: not-allowed; transform: none; box-shadow: none; }

    .attempts-bar { margin-top: 12px; height: 2px; background: #222; border-radius: 2px; overflow: hidden; }
    .attempts-fill { height: 100%; background: linear-gradient(90deg, #fe2c55, #ff6b35); transition: width 0.3s; }

    .msg {
      border-radius: 10px; padding: 11px 14px; font-size: 13px;
      margin-top: 12px; display: none; font-weight: 500;
    }
    .msg.error { background: rgba(254,44,85,0.08); border: 1px solid rgba(254,44,85,0.2); color: #ff6b9d; }
    .msg.warn  { background: rgba(255,200,0,0.08); border: 1px solid rgba(255,200,0,0.2); color: #ffc800; }
    .msg.show  { display: block; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block; vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-text { text-align: center; margin-top: 24px; font-size: 12px; color: #444; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">🎵</div>
    <h1>TikTok Wallet</h1>
    <p>Sign in to manage your balance</p>
  </div>

  <div class="card">
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" maxlength="254"/>
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" maxlength="128" onkeydown="if(event.key==='Enter') login()"/>
        <span class="pw-toggle" onclick="togglePw()">👁</span>
      </div>
    </div>
    <button class="login-btn" id="login-btn" onclick="login()">Sign In</button>
    <div class="attempts-bar"><div class="attempts-fill" id="attempts-fill" style="width:0%"></div></div>
    <div class="msg error" id="error-msg"></div>
    <div class="msg warn"  id="warn-msg"></div>
  </div>

  <div class="footer-text">Protected by Supabase Auth · Single device only</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient('https://viyeyixvxvqwzwnmsfdl.supabase.co','sb_publishable_NWlQdFBD-JcgNl8EuN-Qqw_jx0mBh7-');
    const MAX_ATTEMPTS = 5, LOCKOUT_MS = 5*60*1000, LOCK_KEY = 'tt_lockout', ATTEMPT_KEY = 'tt_attempts';

    sb.auth.getSession().then(({ data }) => { if (data.session) window.location.replace('tiktok-balance.html'); });

    const reason = new URLSearchParams(window.location.search).get('reason');
    if (reason === 'another_device') showError('⚠️ Logged out — account signed in on another device.');
    else if (reason === 'session_expired') showError('⏰ Session expired. Please sign in again.');

    function sanitize(s) { return s.replace(/[<>"'`]/g,'').trim(); }
    function getAttempts() { return parseInt(sessionStorage.getItem(ATTEMPT_KEY)||'0'); }
    function setAttempts(n) { sessionStorage.setItem(ATTEMPT_KEY,n); document.getElementById('attempts-fill').style.width=(n/MAX_ATTEMPTS*100)+'%'; }
    function isLockedOut() { return Date.now() < parseInt(sessionStorage.getItem(LOCK_KEY)||'0'); }
    function getLockRemaining() { return Math.ceil((parseInt(sessionStorage.getItem(LOCK_KEY)||'0')-Date.now())/1000); }
    function showError(msg) { const e=document.getElementById('error-msg'); e.textContent=msg; e.classList.add('show'); }
    function showWarn(msg)  { const e=document.getElementById('warn-msg');  e.textContent=msg; e.classList.add('show'); }
    function clearMsgs()   { document.getElementById('error-msg').classList.remove('show'); document.getElementById('warn-msg').classList.remove('show'); }
    function togglePw()    { const i=document.getElementById('password'); i.type=i.type==='password'?'text':'password'; }

    if (isLockedOut()) {
      document.getElementById('login-btn').disabled = true;
      showError(`Too many attempts. Try again in ${getLockRemaining()}s.`);
      const iv = setInterval(() => {
        if (!isLockedOut()) { clearInterval(iv); document.getElementById('login-btn').disabled=false; clearMsgs(); setAttempts(0); }
        else showError(`Too many attempts. Try again in ${getLockRemaining()}s.`);
      }, 1000);
    }

    async function login() {
      clearMsgs();
      if (isLockedOut()) { showError(`Locked. Try again in ${getLockRemaining()}s.`); return; }
      const email = sanitize(document.getElementById('email').value);
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      if (!email || !password) { showError('Please enter email and password.'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('Invalid email address.'); return; }
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in...';
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        const a = getAttempts()+1; setAttempts(a);
        if (a >= MAX_ATTEMPTS) { sessionStorage.setItem(LOCK_KEY, Date.now()+LOCKOUT_MS); showError('Too many attempts. Locked for 5 minutes.'); btn.textContent='Sign In'; return; }
        const r = MAX_ATTEMPTS-a;
        showError('Invalid email or password.');
        if (r <= 2) showWarn(`⚠️ ${r} attempt${r>1?'s':''} remaining.`);
        btn.disabled=false; btn.textContent='Sign In';
        document.getElementById('password').value='';
        return;
      }
      sessionStorage.removeItem(ATTEMPT_KEY); sessionStorage.removeItem(LOCK_KEY);
      let deviceId = localStorage.getItem('tt_device_id');
      if (!deviceId) { deviceId='dev_'+Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem('tt_device_id',deviceId); }
      await sb.auth.updateUser({ data: { active_device_id: deviceId } });
      window.location.replace('tiktok-balance.html');
    }
  </script>
</body>
</html>
