<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://viyeyixvxvqwzwnmsfdl.supabase.co https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <title>TikTok Wallet — Login</title>
  <script src="theme.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg,#121212); color: var(--text,#fff); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 420px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 32px 24px; }

    .logo { text-align: center; margin-bottom: 36px; }
    .logo .icon { font-size: 56px; margin-bottom: 12px; }
    .logo h1 { font-size: 24px; font-weight: 700; }
    .logo p { font-size: 14px; color: #888; margin-top: 6px; }

    .form-group { margin-bottom: 16px; }
    .form-group label { font-size: 13px; color: #888; display: block; margin-bottom: 8px; }
    .form-group input {
      width: 100%; background: #1e1e1e; border: 1.5px solid #2a2a2a;
      border-radius: 14px; padding: 14px 16px; color: #fff;
      font-size: 15px; outline: none; transition: border-color 0.2s;
      -webkit-user-select: text;
    }
    .form-group input:focus { border-color: #fe2c55; }
    .form-group input::placeholder { color: #444; }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 48px; }
    .pw-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px; color: #555; user-select: none; }

    .login-btn {
      width: 100%; background: #fe2c55; color: #fff; border: none;
      border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 8px; transition: opacity 0.2s, transform 0.15s;
    }
    .login-btn:active { opacity: 0.85; transform: scale(0.98); }
    .login-btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }

    .msg {
      border-radius: 10px; padding: 12px 14px; font-size: 13px;
      margin-top: 14px; display: none;
    }
    .msg.error { background: rgba(254,44,85,0.1); border: 1px solid rgba(254,44,85,0.3); color: #fe2c55; }
    .msg.warn  { background: rgba(255,200,0,0.1);  border: 1px solid rgba(255,200,0,0.3);  color: #ffc800; }
    .msg.show  { display: block; }

    .attempts-bar { margin-top: 10px; height: 3px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
    .attempts-fill { height: 100%; background: #fe2c55; transition: width 0.3s; border-radius: 2px; }

    .spinner {
      width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="logo">
    <div class="icon">🎵</div>
    <h1>TikTok Wallet</h1>
    <p>Sign in to your account</p>
  </div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email" autocomplete="email" maxlength="254" />
  </div>
  <div class="form-group">
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" maxlength="128" onkeydown="if(event.key==='Enter') login()" />
      <span class="pw-toggle" onclick="togglePw()">👁</span>
    </div>
  </div>

  <button class="login-btn" id="login-btn" onclick="login()">Sign In</button>
  <div class="attempts-bar"><div class="attempts-fill" id="attempts-fill" style="width:0%"></div></div>
  <div class="msg error" id="error-msg"></div>
  <div class="msg warn"  id="warn-msg"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://viyeyixvxvqwzwnmsfdl.supabase.co',
      'sb_publishable_NWlQdFBD-JcgNl8EuN-Qqw_jx0mBh7-'
    );

    const MAX_ATTEMPTS = 5;
    const LOCKOUT_MS   = 5 * 60 * 1000; // 5 minutes
    const LOCK_KEY     = 'tt_lockout';
    const ATTEMPT_KEY  = 'tt_attempts';

    // If already logged in, go to wallet
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.replace('tiktok-balance.html');
    });

    // Show reason message if redirected from another device
    const reason = new URLSearchParams(window.location.search).get('reason');
    if (reason === 'another_device') {
      showError('⚠️ You were logged out because your account was signed in on another device.');
    } else if (reason === 'session_expired') {
      showError('⏰ Your session expired. Please sign in again.');
    }

    function sanitize(str) {
      return str.replace(/[<>"'`]/g, '').trim();
    }

    function getAttempts() { return parseInt(sessionStorage.getItem(ATTEMPT_KEY) || '0'); }
    function setAttempts(n) {
      sessionStorage.setItem(ATTEMPT_KEY, n);
      document.getElementById('attempts-fill').style.width = (n / MAX_ATTEMPTS * 100) + '%';
    }

    function isLockedOut() {
      const lockUntil = parseInt(sessionStorage.getItem(LOCK_KEY) || '0');
      return Date.now() < lockUntil;
    }

    function getLockRemaining() {
      const lockUntil = parseInt(sessionStorage.getItem(LOCK_KEY) || '0');
      return Math.ceil((lockUntil - Date.now()) / 1000);
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('show');
    }

    function showWarn(msg) {
      const el = document.getElementById('warn-msg');
      el.textContent = msg;
      el.classList.add('show');
    }

    function clearMsgs() {
      document.getElementById('error-msg').classList.remove('show');
      document.getElementById('warn-msg').classList.remove('show');
    }

    function togglePw() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    // Check lockout on page load
    if (isLockedOut()) {
      document.getElementById('login-btn').disabled = true;
      showError(`Too many failed attempts. Try again in ${getLockRemaining()}s.`);
      const interval = setInterval(() => {
        if (!isLockedOut()) {
          clearInterval(interval);
          document.getElementById('login-btn').disabled = false;
          clearMsgs();
          setAttempts(0);
        } else {
          showError(`Too many failed attempts. Try again in ${getLockRemaining()}s.`);
        }
      }, 1000);
    }

    async function login() {
      clearMsgs();

      if (isLockedOut()) {
        showError(`Account locked. Try again in ${getLockRemaining()}s.`);
        return;
      }

      const email    = sanitize(document.getElementById('email').value);
      const password = document.getElementById('password').value; // don't sanitize password
      const btn      = document.getElementById('login-btn');

      if (!email || !password) {
        showError('Please enter email and password.');
        return;
      }

      // Basic email format check
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('Please enter a valid email address.');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in...';

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        const attempts = getAttempts() + 1;
        setAttempts(attempts);

        if (attempts >= MAX_ATTEMPTS) {
          sessionStorage.setItem(LOCK_KEY, Date.now() + LOCKOUT_MS);
          showError(`Too many failed attempts. Locked for 5 minutes.`);
          btn.disabled = true;
          btn.textContent = 'Sign In';
          return;
        }

        const remaining = MAX_ATTEMPTS - attempts;
        showError(`Invalid email or password.`);
        if (remaining <= 2) showWarn(`⚠️ ${remaining} attempt${remaining > 1 ? 's' : ''} remaining before lockout.`);

        btn.disabled = false;
        btn.textContent = 'Sign In';
        // Clear password field on failed attempt
        document.getElementById('password').value = '';
        return;
      }

      // Success — register this device in user_metadata
      sessionStorage.removeItem(ATTEMPT_KEY);
      sessionStorage.removeItem(LOCK_KEY);

      // Generate or retrieve stable device ID
      let deviceId = localStorage.getItem('tt_device_id');
      if (!deviceId) {
        deviceId = 'dev_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
        localStorage.setItem('tt_device_id', deviceId);
      }

      // Write device ID to user_metadata — overwrites any previous device
      await sb.auth.updateUser({
        data: { active_device_id: deviceId }
      });

      window.location.replace('tiktok-balance.html');
    }
  </script>
</body>
</html>
