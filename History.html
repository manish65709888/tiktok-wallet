<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transaction History</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg,#0a0a0a); color: var(--text,#fff); font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 420px; margin: 0 auto; min-height: 100vh; }

    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; position: sticky; top: 0; background: var(--bg,#0a0a0a); z-index: 10; }
    .header .back { font-size: 22px; cursor: pointer; }
    .header h1 { font-size: 17px; font-weight: 600; }
    .header .placeholder { width: 22px; }

    /* Summary */
    .summary-row {
      display: flex; gap: 12px; padding: 0 20px 20px;
    }
    .summary-card {
      flex: 1; background: #1e1e1e; border-radius: 14px; padding: 14px;
      text-align: center;
    }
    .summary-card .s-icon { font-size: 22px; margin-bottom: 6px; }
    .summary-card .s-val { font-size: 16px; font-weight: 700; }
    .summary-card .s-val.green { color: #25f4ee; }
    .summary-card .s-val.red { color: #fe2c55; }
    .summary-card .s-label { font-size: 11px; color: #666; margin-top: 3px; }

    /* Filter Tabs */
    .filter-tabs {
      display: flex; gap: 8px; padding: 0 20px 16px; overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 7px 16px; border-radius: 20px;
      font-size: 13px; cursor: pointer; border: 1.5px solid #2a2a2a;
      color: #888; background: #1e1e1e; transition: all 0.2s;
    }
    .tab.active { background: #fe2c55; border-color: #fe2c55; color: #fff; font-weight: 600; }

    /* Date Group */
    .date-group { padding: 0 20px; }
    .date-label { font-size: 12px; color: #555; padding: 10px 0 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    .tx-item {
      display: flex; align-items: center; padding: 13px 0;
      border-bottom: 1px solid #1a1a1a; gap: 14px; cursor: pointer;
      transition: opacity 0.2s;
    }
    .tx-item:active { opacity: 0.7; }
    .tx-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .tx-icon.gift    { background: rgba(254,44,85,0.12); }
    .tx-icon.top     { background: rgba(37,244,238,0.1); }
    .tx-icon.cash    { background: rgba(0,200,100,0.12); }
    .tx-icon.diamond { background: rgba(150,100,255,0.15); }
    .tx-icon.refund  { background: rgba(255,165,0,0.12); }
    .tx-icon.send    { background: rgba(255,200,0,0.12); }
    .tx-details { flex: 1; }
    .tx-details h4 { font-size: 14px; font-weight: 500; }
    .tx-details p  { font-size: 12px; color: #555; margin-top: 3px; }
    .tx-amount { text-align: right; }
    .tx-amount .val { font-size: 15px; font-weight: 600; }
    .tx-amount .val.plus  { color: #25f4ee; }
    .tx-amount .val.minus { color: #fe2c55; }
    .tx-amount .badge { font-size: 10px; margin-top: 3px; padding: 2px 7px; border-radius: 10px; display: inline-block; }
    .tx-amount .badge.done { background: rgba(37,244,238,0.1); color: #25f4ee; }
    .tx-amount .badge.pending { background: rgba(255,200,0,0.1); color: #ffc800; }
    .tx-amount .badge.refund { background: rgba(255,165,0,0.1); color: #ffa500; }

    .empty { text-align: center; padding: 60px 20px; color: #444; }
    .empty .e-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 200; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="theme.js"></script>
</head>
<body>

  <div class="header">
    <div class="back" onclick="window.location.href='tiktok-balance.html'">&#8592;</div>
    <h1>Transaction History</h1>
    <div class="placeholder"></div>
  </div>

  <div class="summary-row">
    <div class="summary-card">
      <div class="s-icon">📥</div>
      <div class="s-val green">+$43.49</div>
      <div class="s-label">Total In</div>
    </div>
    <div class="summary-card">
      <div class="s-icon">📤</div>
      <div class="s-val red">-$133.98</div>
      <div class="s-label">Total Out</div>
    </div>
    <div class="summary-card">
      <div class="s-icon">📋</div>
      <div class="s-val">10</div>
      <div class="s-label">Transactions</div>
    </div>
  </div>

  <div class="filter-tabs">
    <div class="tab active" onclick="filterTab(this, 'all')">All</div>
    <div class="tab" onclick="filterTab(this, 'gift')">🎁 Gifts</div>
    <div class="tab" onclick="filterTab(this, 'cash')">💸 Withdrawals</div>
    <div class="tab" onclick="filterTab(this, 'top')">⚡ Recharge</div>
    <div class="tab" onclick="filterTab(this, 'diamond')">💎 Diamonds</div>
    <div class="tab" onclick="filterTab(this, 'send')">🪙 Sent</div>
  </div>

  <div id="tx-container"></div>

  <div class="toast" id="toast"></div>

  <script>
    const allTx = [
      { date: 'Today',        icon: '🎁', type: 'gift',    title: 'Gift Received',      sub: 'From @user_alex · Rose',       amount: '+320 coins', val: 'plus',  badge: 'done' },
      { date: 'Today',        icon: '💸', type: 'cash',    title: 'Withdrawal',         sub: 'To PayPal · ****4521',          amount: '-$50.00',    val: 'minus', badge: 'done' },
      { date: 'Yesterday',    icon: '⚡', type: 'top',     title: 'Coin Recharge',      sub: '1000 Coins Pack',               amount: '-$13.99',    val: 'minus', badge: 'done' },
      { date: 'Yesterday',    icon: '💎', type: 'diamond', title: 'Diamonds Earned',    sub: 'Live stream reward',            amount: '+540 💎',    val: 'plus',  badge: 'done' },
      { date: 'Yesterday',    icon: '🪙', type: 'send',    title: 'Coins Sent',         sub: 'To @sarahkim',                  amount: '-100 coins', val: 'minus', badge: 'done' },
      { date: '2 days ago',   icon: '🎁', type: 'gift',    title: 'Gift Received',      sub: 'From @creator_99 · Universe',  amount: '+1500 coins',val: 'plus',  badge: 'done' },
      { date: '3 days ago',   icon: '🔄', type: 'refund',  title: 'Refund',             sub: 'Cancelled recharge',            amount: '+$6.99',     val: 'plus',  badge: 'refund' },
      { date: '3 days ago',   icon: '⚡', type: 'top',     title: 'Coin Recharge',      sub: '330 Coins Pack',                amount: '-$4.99',     val: 'minus', badge: 'pending' },
      { date: '4 days ago',   icon: '💸', type: 'cash',    title: 'Withdrawal',         sub: 'To Bank · ****8832',            amount: '-$70.00',    val: 'minus', badge: 'done' },
      { date: '5 days ago',   icon: '💎', type: 'diamond', title: 'Diamonds Converted', sub: 'Diamonds → Balance',            amount: '+$18.50',    val: 'plus',  badge: 'done' },
    ];

    let activeFilter = 'all';

    function filterTab(el, type) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      activeFilter = type;
      render();
    }

    function render() {
      const filtered = activeFilter === 'all' ? allTx : allTx.filter(t => t.type === activeFilter);
      const container = document.getElementById('tx-container');

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty"><div class="e-icon">📭</div><p>No transactions found</p></div>`;
        return;
      }

      const groups = {};
      filtered.forEach(tx => {
        if (!groups[tx.date]) groups[tx.date] = [];
        groups[tx.date].push(tx);
      });

      container.innerHTML = Object.entries(groups).map(([date, txs]) => `
        <div class="date-group">
          <div class="date-label">${date}</div>
          ${txs.map(tx => `
            <div class="tx-item" onclick="showToast('${tx.title} · ${tx.amount}')">
              <div class="tx-icon ${tx.type}">${tx.icon}</div>
              <div class="tx-details">
                <h4>${tx.title}</h4>
                <p>${tx.sub}</p>
              </div>
              <div class="tx-amount">
                <div class="val ${tx.val}">${tx.amount}</div>
                <div class="badge ${tx.badge}">${tx.badge === 'done' ? 'Completed' : tx.badge === 'pending' ? 'Pending' : 'Refunded'}</div>
              </div>
            </div>`).join('')}
        </div>`).join('');
    }

    render();

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }
  </script>
  <script src="auth.js"></script>
</body>
</html>
