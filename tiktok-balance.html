<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Wallet</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="theme.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: 'Inter', -apple-system, sans-serif; max-width: 420px; margin: 0 auto; min-height: 100vh; }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      position: sticky; top: 0; background: #0a0a0a; z-index: 10;
      border-bottom: 1px solid #141414;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #fe2c55, #ff6b35);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700;
    }
    .header-title { font-size: 16px; font-weight: 700; }
    .header-sub { font-size: 11px; color: #555; margin-top: 1px; }
    .more-btn { font-size: 20px; cursor: pointer; position: relative; color: #888; padding: 4px; }

    /* Theme Menu */
    .theme-menu {
      position: absolute; top: 36px; right: 0;
      background: #141414; border: 1px solid #222;
      border-radius: 16px; padding: 8px 0; min-width: 190px;
      z-index: 100; box-shadow: 0 16px 48px rgba(0,0,0,0.6);
      opacity: 0; pointer-events: none;
      transform: translateY(-8px) scale(0.97);
      transition: all 0.2s cubic-bezier(.4,0,.2,1);
    }
    .theme-menu.open { opacity: 1; pointer-events: all; transform: translateY(0) scale(1); }
    .theme-menu-title { font-size: 10px; color: #444; padding: 6px 16px 8px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .theme-opt { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; font-size: 13px; font-weight: 500; transition: background 0.15s; color: #ccc; }
    .theme-opt:hover { background: #1e1e1e; }
    .theme-opt.active { color: #fe2c55; }
    .theme-opt .dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; border: 2px solid transparent; }
    .theme-opt.active .dot { border-color: #fe2c55; }
    .menu-divider { height: 1px; background: #1e1e1e; margin: 4px 0; }

    /* Balance Card */
    .balance-card {
      margin: 16px 20px 0;
      background: linear-gradient(135deg, #141428 0%, #1a1035 50%, #0d1a2e 100%);
      border-radius: 24px;
      padding: 28px 24px 24px;
      position: relative; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .balance-card::before {
      content: ''; position: absolute; top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(254,44,85,0.2) 0%, transparent 70%);
    }
    .balance-card::after {
      content: ''; position: absolute; bottom: -40px; left: -40px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(37,244,238,0.12) 0%, transparent 70%);
    }
    .balance-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.06); border-radius: 20px;
      padding: 4px 10px; font-size: 11px; color: #888; font-weight: 500;
      margin-bottom: 14px;
    }
    .balance-tag span { width: 6px; height: 6px; background: #25f4ee; border-radius: 50%; display: inline-block; }
    .balance-amount { font-size: 46px; font-weight: 800; letter-spacing: -2px; line-height: 1; }
    .balance-amount .currency { font-size: 28px; font-weight: 600; color: #aaa; margin-right: 2px; vertical-align: top; margin-top: 8px; display: inline-block; }
    .balance-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 20px 0 16px; }
    .balance-sub { display: flex; justify-content: center; gap: 0; }
    .balance-sub-item { flex: 1; }
    .balance-sub-item:not(:last-child) { border-right: 1px solid rgba(255,255,255,0.06); padding-right: 16px; margin-right: 16px; }
    .balance-sub-item label { font-size: 11px; color: #555; display: block; margin-bottom: 5px; font-weight: 500; }
    .balance-sub-item p { font-size: 14px; font-weight: 700; color: #fe2c55; }
    .balance-sub-item p.teal { color: #25f4ee; }
    .balance-sub-item p.green { color: #00c853; }

    /* Actions */
    .actions { display: flex; justify-content: space-around; padding: 24px 16px 8px; }
    .action-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
    .action-icon {
      width: 58px; height: 58px; border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; transition: transform 0.15s, box-shadow 0.15s;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .action-icon:active { transform: scale(0.9); }
    .action-icon.withdraw { background: rgba(254,44,85,0.12); box-shadow: 0 4px 16px rgba(254,44,85,0.1); }
    .action-icon.recharge { background: rgba(37,244,238,0.1);  box-shadow: 0 4px 16px rgba(37,244,238,0.08); }
    .action-icon.send     { background: rgba(255,200,0,0.1);   box-shadow: 0 4px 16px rgba(255,200,0,0.08); }
    .action-icon.history  { background: rgba(150,100,255,0.12);box-shadow: 0 4px 16px rgba(150,100,255,0.1); }
    .action-btn span { font-size: 11px; color: #666; font-weight: 500; }

    /* Section Title */
    .section-title {
      padding: 22px 20px 12px;
      font-size: 14px; font-weight: 700; color: #fff;
      display: flex; justify-content: space-between; align-items: center;
      letter-spacing: -0.2px;
    }
    .section-title a { font-size: 12px; color: #fe2c55; text-decoration: none; font-weight: 600; }

    /* Coins Banner */
    .coins-banner {
      margin: 0 20px;
      background: linear-gradient(135deg, #1a1a2e, #1e1028);
      border-radius: 16px; padding: 16px 18px;
      display: flex; align-items: center; justify-content: space-between;
      border: 1px solid rgba(254,44,85,0.15);
    }
    .coins-info { display: flex; align-items: center; gap: 12px; }
    .coin-icon-wrap {
      width: 42px; height: 42px; border-radius: 12px;
      background: rgba(254,44,85,0.12);
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .coins-info h3 { font-size: 14px; font-weight: 700; }
    .coins-info p { font-size: 11px; color: #555; margin-top: 3px; }
    .topup-btn {
      background: linear-gradient(135deg, #fe2c55, #ff6b35);
      color: #fff; border: none; border-radius: 20px;
      padding: 8px 16px; font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 12px rgba(254,44,85,0.3);
      transition: opacity 0.2s;
    }
    .topup-btn:active { opacity: 0.8; }

    /* Transactions */
    .tx-list { padding: 0 20px 40px; }
    .tx-item {
      display: flex; align-items: center; padding: 14px 0;
      border-bottom: 1px solid #141414; gap: 14px;
      transition: opacity 0.15s;
    }
    .tx-item:active { opacity: 0.7; }
    .tx-icon {
      width: 46px; height: 46px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .tx-icon.gift    { background: rgba(254,44,85,0.1); }
    .tx-icon.top     { background: rgba(37,244,238,0.08); }
    .tx-icon.cash    { background: rgba(0,200,100,0.1); }
    .tx-icon.diamond { background: rgba(150,100,255,0.12); }
    .tx-icon.refund  { background: rgba(255,165,0,0.1); }
    .tx-details { flex: 1; }
    .tx-details h4 { font-size: 13px; font-weight: 600; }
    .tx-details p  { font-size: 11px; color: #555; margin-top: 3px; font-weight: 400; }
    .tx-amount { text-align: right; }
    .tx-amount .val { font-size: 14px; font-weight: 700; }
    .tx-amount .val.plus  { color: #25f4ee; }
    .tx-amount .val.minus { color: #fe2c55; }
    .tx-amount .status { font-size: 10px; color: #444; margin-top: 3px; font-weight: 500; }

    /* Toast */
    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e1e1e; color: #fff;
      padding: 10px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 500;
      opacity: 0; transition: all 0.3s;
      pointer-events: none; white-space: nowrap;
      border: 1px solid #2a2a2a;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="header-avatar">W</div>
      <div>
        <div class="header-title">My Wallet</div>
        <div class="header-sub">TikTok Balance</div>
      </div>
    </div>
    <div class="more-btn" id="more-btn" onclick="toggleMenu(event)">⋮
      <div class="theme-menu" id="theme-menu">
        <div class="theme-menu-title">Appearance</div>
        <div class="theme-opt active" id="opt-dark"   onclick="setTheme('dark',event)">  <div class="dot" style="background:#0a0a0a"></div> Dark</div>
        <div class="theme-opt"        id="opt-light"  onclick="setTheme('light',event)"> <div class="dot" style="background:#f0f0f0;border-color:#ddd"></div> Light</div>
        <div class="theme-opt"        id="opt-pink"   onclick="setTheme('pink',event)">  <div class="dot" style="background:linear-gradient(135deg,#fe2c55,#ff6b9d)"></div> Pink</div>
        <div class="theme-opt"        id="opt-blue"   onclick="setTheme('blue',event)">  <div class="dot" style="background:linear-gradient(135deg,#25f4ee,#0066ff)"></div> Ocean</div>
        <div class="theme-opt"        id="opt-purple" onclick="setTheme('purple',event)"><div class="dot" style="background:linear-gradient(135deg,#9664ff,#ff6b35)"></div> Purple</div>
        <div class="menu-divider"></div>
        <div class="theme-opt" onclick="logout()" style="color:#fe2c55"><div class="dot" style="background:#fe2c55"></div> Sign Out</div>
      </div>
    </div>
  </div>

  <div class="balance-card">
    <div class="balance-tag"><span></span> Total Balance</div>
    <div class="balance-amount"><span class="currency">$</span><span id="main-balance">10.00</span></div>
    <div class="balance-divider"></div>
    <div class="balance-sub">
      <div class="balance-sub-item">
        <label>🪙 Coins</label>
        <p>874,535</p>
      </div>
      <div class="balance-sub-item">
        <label>💎 Diamonds</label>
        <p class="teal">850,000</p>
      </div>
      <div class="balance-sub-item">
        <label>💵 Withdrawable</label>
        <p class="green">$637,085</p>
      </div>
    </div>
  </div>

  <div class="actions">
    <div class="action-btn" onclick="window.location.href='Withdraw.html'">
      <div class="action-icon withdraw">💸</div>
      <span>Withdraw</span>
    </div>
    <div class="action-btn" onclick="window.location.href='Recharge.html'">
      <div class="action-icon recharge">⚡</div>
      <span>Recharge</span>
    </div>
    <div class="action-btn" onclick="window.location.href='Reward.html'">
      <div class="action-icon send">🏆</div>
      <span>Reward</span>
    </div>
    <div class="action-btn" onclick="window.location.href='History.html'">
      <div class="action-icon history">📋</div>
      <span>History</span>
    </div>
  </div>

  <div class="section-title">TikTok Coins</div>
  <div class="coins-banner">
    <div class="coins-info">
      <div class="coin-icon-wrap">🪙</div>
      <div>
        <h3>874,535 Coins</h3>
        <p>Send gifts to your favorite creators</p>
      </div>
    </div>
    <button class="topup-btn" onclick="window.location.href='Recharge.html'">Top Up</button>
  </div>

  <div class="section-title">
    Recent Transactions
    <a href="History.html">See all</a>
  </div>
  <div class="tx-list" id="tx-list"></div>

  <div class="toast" id="toast"></div>

  <script>
    function refreshBalance() {
      const saved = localStorage.getItem('tt_balance');
      const val = saved ? parseFloat(saved) : 10.00;
      document.getElementById('main-balance').textContent = val.toFixed(2);
    }
    refreshBalance();
    window.addEventListener('pageshow', () => { refreshBalance(); renderTransactions(); });

    const staticTx = [
      { icon: '🎁', type: 'gift',    title: 'Gift Received',      sub: 'From @user_alex · Rose',       amount: '+320 coins',  val: 'plus',  status: 'Completed · Today 2:14 PM' },
      { icon: '💸', type: 'cash',    title: 'Withdrawal',         sub: 'To PayPal · ****4521',          amount: '-$50.00',     val: 'minus', status: 'Completed · Today 10:00 AM' },
      { icon: '⚡', type: 'top',     title: 'Recharge',           sub: '$25.00 added',                  amount: '+$25.00',     val: 'plus',  status: 'Completed · Yesterday' },
      { icon: '💎', type: 'diamond', title: 'Diamonds Earned',    sub: 'Live stream reward',            amount: '+540 💎',     val: 'plus',  status: 'Completed · Yesterday' },
      { icon: '🎁', type: 'gift',    title: 'Gift Received',      sub: 'From @creator_99 · Universe',  amount: '+1500 coins', val: 'plus',  status: 'Completed · 2 days ago' },
      { icon: '🔄', type: 'refund',  title: 'Refund',             sub: 'Cancelled recharge',            amount: '+$6.99',      val: 'plus',  status: 'Refunded · 3 days ago' },
      { icon: '💸', type: 'cash',    title: 'Withdrawal',         sub: 'To Bank · ****8832',            amount: '-$70.00',     val: 'minus', status: 'Completed · 4 days ago' },
      { icon: '💎', type: 'diamond', title: 'Diamonds Converted', sub: 'Diamonds → Balance',            amount: '+$18.50',     val: 'plus',  status: 'Completed · 5 days ago' },
    ];

    function renderTransactions() {
      const liveTx = JSON.parse(localStorage.getItem('tt_transactions') || '[]');
      const all = [...liveTx, ...staticTx];
      document.getElementById('tx-list').innerHTML = all.map(tx => `
        <div class="tx-item">
          <div class="tx-icon ${tx.type}">${tx.icon}</div>
          <div class="tx-details">
            <h4>${tx.title}</h4>
            <p>${tx.sub}</p>
          </div>
          <div class="tx-amount">
            <div class="val ${tx.val}">${tx.amount}</div>
            <div class="status">${tx.status}</div>
          </div>
        </div>`).join('');
    }
    renderTransactions();

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    function toggleMenu(e) { e.stopPropagation(); document.getElementById('theme-menu').classList.toggle('open'); }
    document.addEventListener('click', () => document.getElementById('theme-menu').classList.remove('open'));

    function setTheme(name, e) {
      if (e) e.stopPropagation();
      applyTheme(name);
      localStorage.setItem('tt_theme', name);
      document.querySelectorAll('.theme-opt').forEach(el => el.classList.remove('active'));
      document.getElementById('opt-' + name) && document.getElementById('opt-' + name).classList.add('active');
      document.getElementById('theme-menu').classList.remove('open');
      showToast(name.charAt(0).toUpperCase() + name.slice(1) + ' theme applied');
    }

    const savedTheme = localStorage.getItem('tt_theme');
    if (savedTheme) { applyTheme(savedTheme); document.getElementById('opt-' + savedTheme) && document.getElementById('opt-' + savedTheme).classList.add('active'); }
  </script>
  <script src="auth.js"></script>
</body>
</html>
